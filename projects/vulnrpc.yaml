name: vulnrpc
description: Randall VulnRpc — DCE-shaped bind→request lab (build with scripts/build-vulnrpc.ps1)
kind: tcp
target:
  executable: ../targets/vulnrpc/randall-vulnrpc.exe
  longLived: true
  timeoutMs: 5000
transport:
  type: tcp
  host: 127.0.0.1
  port: 1355
  receiveTimeoutMs: 1500
sessionCommands:
  - name: BIND
    model: protocols/dce_bind.yaml
    readBanner: false
    expectResponse: BIND_ACK
  - name: REQUEST
    model: protocols/dce_request.yaml
    readBanner: false
    expectResponse: RPC_OK
sessionFlows:
  - name: bind_request
    steps: [BIND, REQUEST]
    mutateStep: last
sessionGraph:
  start: BIND
  mutate: REQUEST
  edges:
    - { from: BIND, when: "BIND_ACK", to: REQUEST }
fuzz:
  maxIterations: 800
  sessionFlowBias: 0.7
  sessionGraphBias: 0.3
  corpusDir: ../data/corpus/vulnrpc
  crashesDir: ../data/crashes/vulnrpc
# Semantic oracles — auth/state/logic (docs/ORACLES.md). Seeds still hunt memory bugs.
oracles:
  enabled: true
  retainOnViolation: true
  retainOnNearMiss: true
  promoteExpectResponse: true
  auth:
    - id: no-rpc-ok-before-bind
      type: forbidUntil
      forbidResponse: "RPC_OK"
      untilResponse: "BIND_ACK"
      severity: violation
    - id: request-requires-bind-ack
      type: requireAuth
      whenCommand: REQUEST
      untilResponse: "BIND_ACK"
      severity: violation
  state:
    - id: request-after-bind
      type: commandRequiresPrior
      forCommand: REQUEST
      priorCommand: BIND
      priorResponse: BIND_ACK
      severity: violation
  structure:
    - id: min-dce-header
      type: minSize
      bytes: 16
      onlyWhenAccepted: true
      severity: nearMiss
  resource:
    - id: rpc-response-cap
      type: maxResponseBytes
      maxBytes: 65536
      severity: nearMiss
seeds:
  - seeds/dce_request_overflow.bin
mutators:
  - bitflip
  - havoc
  - interesting
  - expand
  - boundary
  - insert
