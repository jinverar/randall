name: file-framed
description: In-repo length-prefixed binary mini-parser (build with scripts/build-file-framed.*)
kind: file
model: protocols/file_framed.yaml
target:
  executable: ../targets/file-framed/app.exe
  args:
    - "{file}"
  timeoutMs: 5000
transport:
  type: file
  extension: .bin
fuzz:
  maxIterations: 300
  coverageGuided: true
  corpusDir: ../data/corpus/file-framed
  crashesDir: ../data/crashes/file-framed
seeds:
  - seeds/file_framed_sample.bin
  - seeds/file_framed_record.bin
  - seeds/file_framed_lie.bin
  - seeds/file_framed_boom.bin
mutators:
  - bitflip
  - expand
  - truncate
  - boundary
  - insert
  - dictionary
  - havoc
  - interesting
dictionaryFile: dictionaries/file-framed.txt
