name: file-framed
description: Generic length-prefixed binary file target (replace exe + seeds with your lab copy)
kind: file
model: protocols/file_framed.yaml
target:
  executable: ../targets/file-framed/app.exe
  args:
    - "{file}"
  timeoutMs: 15000
transport:
  type: file
  extension: .bin
fuzz:
  maxIterations: 500
  corpusDir: ../data/corpus/file-framed
  crashesDir: ../data/crashes/file-framed
seeds:
  - seeds/file_framed_sample.bin
  - seeds/file_framed_record.bin
mutators:
  - bitflip
  - expand
  - truncate
  - boundary
  - insert
