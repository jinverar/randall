name: vulnssh
description: Randall VulnSsh stub — fake SSH plaintext lab. Build with scripts/build-vulnssh.ps1
kind: tcp
target:
  executable: ../targets/vulnssh/randall-vulnssh.exe
  longLived: true
  timeoutMs: 5000
transport:
  type: tcp
  host: 127.0.0.1
  port: 2222
  receiveTimeoutMs: 2000
sessionCommands:
  - name: VERSION
    model: protocols/ssh_version.yaml
    readBanner: true
  - name: EXEC
    model: protocols/ssh_exec.yaml
    readBanner: false
sessionFlows:
  - name: version_exec
    steps: [VERSION, EXEC]
    mutateStep: last
fuzz:
  maxIterations: 1000
  sessionFlowBias: 0.4
  corpusDir: ../data/corpus/vulnssh
  crashesDir: ../data/crashes/vulnssh
mutators:
  - bitflip
  - havoc
  - expand
  - boundary
  - insert
