# Web-app fuzzing — first-class kind: http (TCP tube + HTTP helpers).
# Docs: docs/WEB_FUZZ.md · Bug Hunter catalog: docs/BUG_HUNTER.md
#
#   scripts/build-vulnhttp.ps1   # or your own web target
#   randall fuzz -c projects/webapp.yaml
#   randall oracles -p webapp
name: webapp
description: Web application fuzzing (HTTP) — VulnHttp lab or point at your app
kind: http
target:
  # Windows lab: randall-vulnhttp.exe · Linux: build targets/Randall.VulnHttp → randall-vulnhttp
  executable: ../targets/vulnhttp/randall-vulnhttp
  longLived: true
  timeoutMs: 5000
transport:
  type: http
  host: 127.0.0.1
  port: 8080
  receiveTimeoutMs: 2000
sessionCommands:
  - name: GET
    model: protocols/http_get.yaml
    readBanner: false
    expectResponse: "HTTP/"
  - name: POST
    model: protocols/http_post.yaml
    readBanner: false
    expectResponse: "HTTP/"
bugHunter:
  enabled: true
  autoArmOracles: true
  autoArmDictionary: true
  scanOnFuzzStart: false
oracles:
  enabled: true
  retainOnViolation: true
  retainOnNearMiss: true
  promoteExpectResponse: true
  # Bug Hunter fills empty auth/state/… when autoArmOracles is true.
  # Web-specific: treat unexpected 5xx / reflections via resource + structure.
  resource:
    - id: http-response-cap
      type: maxResponseBytes
      maxBytes: 1048576
      severity: nearMiss
  structure:
    - id: http-min-status-line
      type: minSize
      bytes: 12
      onlyWhenAccepted: true
      severity: nearMiss
fuzz:
  maxIterations: 1000
  powerSchedule: true
  havocDepth: 8
  syncContentLength: true
  corpusDir: ../data/corpus/webapp
  crashesDir: ../data/crashes/webapp
dictionaryFile: dictionaries/ai_codegen_mistakes.txt
mutators:
  - dictionary
  - interesting
  - boundary
  - havoc
  - expand
  - insert
  - splice
