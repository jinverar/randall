name: vulnlab
description: Randall VulnLab (native Linux) — mitigation-ladder practice service; ECHO stack overflow
kind: tcp
target:
  # Default to the "basic" (no-mitigation) tier. Point at vulnlab-nx / -aslr / -modern to practise
  # against harder targets. Build all tiers with scripts/build-mitigation-lab.sh.
  executable: ../targets/vulnlab/vulnlab-basic
  longLived: true
  timeoutMs: 5000
transport:
  type: tcp
  host: 127.0.0.1
  port: 9999
  receiveTimeoutMs: 1500
sessionCommands:
  - name: ECHO
    model: protocols/vulnlab_echo.yaml
    readBanner: true
    expectResponse: "ECHO"
fuzz:
  maxIterations: 1000
  corpusDir: ../data/corpus/vulnlab
  crashesDir: ../data/crashes/vulnlab
# Hybrid semantic oracles — supplements coverage (docs/ORACLES.md)
oracles:
  enabled: true
  retainOnViolation: true
  retainOnNearMiss: true
  promoteExpectResponse: true
  invariants:
    - id: echo-max
      type: maxResponseBytes
      maxBytes: 65536
      severity: nearMiss
  metamorphic:
    - id: echo-ws
      type: whitespaceInsensitive
      severity: nearMiss
seeds:
  - seeds/vulnlab_echo.txt
mutators:
  - bitflip
  - havoc
  - expand
  - boundary
  - insert
