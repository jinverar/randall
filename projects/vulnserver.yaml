name: vulnserver
description: Classic Vulnserver TCP lab target — session graph + block models
kind: tcp
target:
  executable: ../targets/vulnserver/vulnserver.exe
  longLived: true
  timeoutMs: 5000
transport:
  type: tcp
  host: 127.0.0.1
  port: 9999
  receiveTimeoutMs: 1500
sessionCommands:
  - name: TRUN
    model: protocols/vulnserver_trun.yaml
    readBanner: true
  - name: GMON
    model: protocols/vulnserver_gmon.yaml
    readBanner: true
  - name: GTER
    prefix: "GTER "
    seed: seeds/vulnserver_gter.txt
    readBanner: true
  - name: KSTET
    prefix: "KSTET /.:/"
    seed: seeds/vulnserver_kstet.txt
    readBanner: true
  - name: HTER
    prefix: "HTER /.:/"
    seed: seeds/vulnserver_hter.txt
    readBanner: true
  - name: STAT_TRUN
    model: protocols/vulnserver_trun.yaml
    preamble: "STAT\r\n"
    readBanner: true
fuzz:
  maxIterations: 1000
  corpusDir: ../data/corpus/vulnserver
  crashesDir: ../data/crashes/vulnserver
seeds:
  - seeds/vulnserver_trun.txt
mutators:
  - bitflip
  - expand
  - boundary
  - insert
plugins:
  - path: ../plugins/xor-silly
    hook: mutate
