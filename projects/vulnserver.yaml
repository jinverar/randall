name: vulnserver
description: Randall custom vulnserver — TCP lab target (build with scripts/build-vulnserver.ps1)
kind: tcp
target:
  executable: ../targets/vulnserver/randall-vulnserver.exe
  longLived: true
  timeoutMs: 5000
transport:
  type: tcp
  host: 127.0.0.1
  port: 9999
  receiveTimeoutMs: 1500
sessionCommands:
  - name: TRUN
    model: protocols/vulnserver_trun.yaml
    readBanner: true
  - name: GMON
    model: protocols/vulnserver_gmon.yaml
    readBanner: true
  - name: GTER
    model: protocols/vulnserver_gter.yaml
    readBanner: true
  - name: KSTET
    model: protocols/vulnserver_kstet.yaml
    readBanner: true
  - name: HTER
    model: protocols/vulnserver_hter.yaml
    readBanner: true
  - name: STAT_TRUN
    model: protocols/vulnserver_trun.yaml
    preamble: "STAT\r\n"
    readBanner: true
  - name: RAND
    model: protocols/vulnserver_rand.yaml
    readBanner: true
fuzz:
  maxIterations: 1000
  powerSchedule: true
  havocDepth: 8
  sessionFlowBias: 0.25
  corpusDir: ../data/corpus/vulnserver
  crashesDir: ../data/crashes/vulnserver
dictionaryFile: dictionaries/fuzz.txt
dictionary:
  - "TRUN /.:/"
  - "%s%s%s%s"
sessionFlows:
  - name: stat_trun
    steps:
      - STAT_TRUN
      - TRUN
  - name: gmon_probe
    steps:
      - GMON
seeds:
  - seeds/vulnserver_trun.txt
mutators:
  - bitflip
  - havoc
  - interesting
  - dictionary
  - splice
  - arith
  - expand
  - boundary
  - insert
plugins:
  - path: ../plugins/xor-silly
    hook: mutate
