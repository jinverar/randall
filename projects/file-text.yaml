name: file-text
description: Generic structured text / XML file target (replace exe + seeds with your lab copy)
kind: file
model: protocols/file_text.yaml
target:
  executable: ../targets/file-text/app.exe
  args:
    - "{file}"
  timeoutMs: 15000
transport:
  type: file
  extension: .xml
fuzz:
  maxIterations: 500
  corpusDir: ../data/corpus/file-text
  crashesDir: ../data/crashes/file-text
seeds:
  - seeds/file_text_sample.xml
  - seeds/file_text_weird.txt
mutators:
  - bitflip
  - expand
  - truncate
  - boundary
  - insert
