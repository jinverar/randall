name: vulnturret-hello
description: STT1 HELLO — type 0x01 + BE rem_len + name (sentry station lab)
blocks:
  - type: bytes
    name: pkt_type
    mutable: false
    minSize: 1
    maxSize: 1
    seedFile: seeds/vulnturret_type_hello.bin
  - type: sized
    lengthName: rem_len
    lengthBytes: 2
    littleEndian: false
    child:
      type: sized
      lengthName: name_len
      lengthBytes: 2
      littleEndian: false
      child:
        type: string
        name: station_name
        mutable: true
        value: "lab-sentry"
        minSize: 1
        maxSize: 256
