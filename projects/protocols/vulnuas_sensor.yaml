name: vulnuas-sensor
description: UAS1 SENSOR — type 0x03 + sensor-bay config (not munitions)
blocks:
  - type: bytes
    name: pkt_type
    mutable: false
    minSize: 1
    maxSize: 1
    seedFile: seeds/vulnuas_type_sensor.bin
  - type: sized
    lengthName: rem_len
    lengthBytes: 2
    littleEndian: false
    child:
      type: sized
      lengthName: cfg_len
      lengthBytes: 2
      littleEndian: false
      child:
        type: string
        name: sensor_cfg
        mutable: true
        value: "eo-zoom"
        minSize: 1
        maxSize: 256
