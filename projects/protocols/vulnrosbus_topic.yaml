name: vulnrosbus-topic
description: RRBS TOPIC — magic/ver/type + BE topic_len + topic + BE payload (not ROS/DDS)
blocks:
  - type: static
    value: "\x52\x52"
  - type: static
    value: "\x01"
  - type: bytes
    name: msg_type
    mutable: false
    minSize: 1
    maxSize: 1
    seedFile: seeds/vulnrosbus_type_topic.bin
  - type: sized
    lengthName: topic_len
    lengthBytes: 2
    littleEndian: false
    child:
      type: string
      name: topic
      mutable: true
      value: "/cmd_vel"
      minSize: 1
      maxSize: 96
  - type: sized
    lengthName: payload_len
    lengthBytes: 2
    littleEndian: false
    child:
      type: bytes
      name: payload
      mutable: true
      minSize: 0
      maxSize: 400
      seedFile: seeds/vulnrosbus_payload_small.bin
