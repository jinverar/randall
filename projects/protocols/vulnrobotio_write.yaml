name: vulnrobotio-write
description: RMB1 WRITE_REG — MBAP + func 0x06 + addr/value (not Modbus)
blocks:
  - type: word
    name: tx_id
    mutable: true
    littleEndian: false
    value: 1
  - type: static
    value: "\x00\x01"
  - type: sized
    lengthName: adu_len
    lengthBytes: 2
    littleEndian: false
    child:
      type: group
      children:
        - type: static
          value: "\x01"
        - type: bytes
          name: func
          mutable: false
          minSize: 1
          maxSize: 1
          seedFile: seeds/vulnrobotio_func_write_reg.bin
        - type: word
          name: addr
          mutable: true
          littleEndian: false
          value: 1
        - type: word
          name: value
          mutable: true
          littleEndian: false
          value: 16
