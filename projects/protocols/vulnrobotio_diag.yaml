name: vulnrobotio-diag
description: RMB1 DIAG — MBAP + func 0x08 + subcode (not Modbus)
blocks:
  - type: word
    name: tx_id
    mutable: true
    littleEndian: false
    value: 1
  - type: static
    value: "\x00\x01"
  - type: sized
    lengthName: adu_len
    lengthBytes: 2
    littleEndian: false
    child:
      type: group
      children:
        - type: static
          value: "\x01"
        - type: bytes
          name: func
          mutable: false
          minSize: 1
          maxSize: 1
          seedFile: seeds/vulnrobotio_func_diag.bin
        - type: word
          name: subcode
          mutable: true
          littleEndian: false
          value: 1
