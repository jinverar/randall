name: vulnai-infer
description: RAG1 INFER — type 0x01 + BE rem_len + prompt_len + prompt (AI length-lie lab)
blocks:
  - type: bytes
    name: pkt_type
    mutable: false
    minSize: 1
    maxSize: 1
    seedFile: seeds/vulnai_type_infer.bin
  - type: sized
    lengthName: rem_len
    lengthBytes: 2
    littleEndian: false
    child:
      type: sized
      lengthName: prompt_len
      lengthBytes: 2
      littleEndian: false
      child:
        type: string
        name: prompt
        mutable: true
        value: "hello-lab"
        minSize: 1
        maxSize: 256
