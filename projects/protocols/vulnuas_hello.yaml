name: vulnuas-hello
description: UAS1 HELLO — type 0x01 + BE rem_len + callsign (tactical-link lab)
blocks:
  - type: bytes
    name: pkt_type
    mutable: false
    minSize: 1
    maxSize: 1
    seedFile: seeds/vulnuas_type_hello.bin
  - type: sized
    lengthName: rem_len
    lengthBytes: 2
    littleEndian: false
    child:
      type: sized
      lengthName: name_len
      lengthBytes: 2
      littleEndian: false
      child:
        type: string
        name: callsign
        mutable: true
        value: "lab-uas"
        minSize: 1
        maxSize: 256
