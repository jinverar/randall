name: http-post
description: HTTP POST with body — Content-Length synced when fuzz.syncContentLength is true
blocks:
  - type: static
    value: "POST "
  - type: string
    name: uri
    mutable: true
    value: "/upload"
    maxSize: 4096
  - type: static
    value: " HTTP/1.1\r\nHost: 127.0.0.1\r\nUser-Agent: Randfuzz/1.0\r\nContent-Type: application/x-www-form-urlencoded\r\nContent-Length: "
  - type: string
    name: content_length
    mutable: true
    value: "11"
  - type: static
    value: "\r\nConnection: close\r\n\r\n"
  - type: string
    name: body
    mutable: true
    value: "q=test&x=1"
    maxSize: 8192
