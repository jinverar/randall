name: vulnai-admin
description: RAG1 ADMIN — type 0x03 + role/token (AI auth-skip lab)
blocks:
  - type: bytes
    name: pkt_type
    mutable: false
    minSize: 1
    maxSize: 1
    seedFile: seeds/vulnai_type_admin.bin
  - type: sized
    lengthName: rem_len
    lengthBytes: 2
    littleEndian: false
    child:
      type: sized
      lengthName: token_len
      lengthBytes: 2
      littleEndian: false
      child:
        type: string
        name: role_token
        mutable: true
        value: "user"
        minSize: 1
        maxSize: 128
