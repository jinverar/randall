name: ftp-pass
description: FTP PASS command
blocks:
  - type: string
    name: key
    value: "PASS"
    mutable: false
  - type: delim
    name: space
    value: " "
    mutable: false
  - type: string
    name: password
    mutable: true
    value: "guest"
    maxSize: 4096
  - type: static
    value: "\r\n"
