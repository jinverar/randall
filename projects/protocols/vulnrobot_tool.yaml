name: vulnrobot-tool
description: RBT1 TOOL — type 0x04 + BE rem_len + path_len + toolpath blob
blocks:
  - type: bytes
    name: pkt_type
    mutable: false
    minSize: 1
    maxSize: 1
    seedFile: seeds/vulnrobot_type_tool.bin
  - type: sized
    lengthName: rem_len
    lengthBytes: 2
    littleEndian: false
    child:
      type: sized
      lengthName: path_len
      lengthBytes: 2
      littleEndian: false
      child:
        type: bytes
        name: toolpath
        mutable: true
        minSize: 0
        maxSize: 512
        seedFile: seeds/vulnrobot_toolpath.bin
