name: file-framed
description: Length-prefixed record — 4-byte LE length + mutable payload
blocks:
  - type: sized
    lengthName: record_len
    lengthBytes: 4
    littleEndian: true
    child:
      type: bytes
      name: record
      mutable: true
      minSize: 8
      maxSize: 4096
      seedFile: seeds/file_framed_record.bin
